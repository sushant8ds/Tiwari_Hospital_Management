<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - {{ hospital_name }}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            background: #ffffff;
        }
        .login-header {
            background-color: #8B0000;
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
        }
        .login-logo {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .hospital-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .login-body {
            padding: 30px;
        }
        .nav-pills-custom {
            display: flex;
            background-color: #f1f3f5;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 25px;
        }
        .nav-pills-custom .nav-link {
            flex: 1;
            text-align: center;
            border-radius: 6px;
            color: #495057;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px;
            border: none;
            background: transparent;
            transition: all 0.2s ease;
        }
        .nav-pills-custom .nav-link.active {
            background-color: #8B0000;
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(139, 0, 0, 0.25);
        }
        .form-control:focus {
            border-color: #8B0000;
            box-shadow: 0 0 0 0.25rem rgba(139, 0, 0, 0.25);
        }
        .btn-login {
            background-color: #8B0000;
            border: none;
            color: #ffffff;
            font-weight: 600;
            padding: 10px;
            transition: all 0.2s ease;
            width: 100%;
        }
        .btn-login:hover {
            background-color: #a00000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }
        .error-message {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <div class="login-logo"><i class="fas fa-hospital-user"></i></div>
        <div class="hospital-title">{{ hospital_name.upper() }}</div>
        <div class="small opacity-75">OPD & IPD Portal</div>
    </div>
    
    <div class="login-body">
        <div class="nav-pills-custom">
            <button class="nav-link active" id="staff-tab" onclick="switchTab('staff')">
                <i class="fas fa-user me-2"></i>Staff Login
            </button>
            <button class="nav-link" id="owner-tab" onclick="switchTab('owner')">
                <i class="fas fa-user-shield me-2"></i>Owner Login
            </button>
        </div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold text-muted">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="username" placeholder="Enter username" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label small fw-bold text-muted">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="Enter password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-login" id="submitBtn">
                <span id="btnText">Sign In</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;" role="status" aria-hidden="true"></span>
            </button>
            
            <div class="error-message text-center" id="errorMessage"></div>
        </form>
    </div>
</div>

<script>
    // Initial view mode: staff (which will auto-fill username "staff" for convenience)
    let currentRole = 'staff';
    
    function switchTab(role) {
        currentRole = role;
        const staffTab = document.getElementById('staff-tab');
        const ownerTab = document.getElementById('owner-tab');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMessage');
        
        errorMsg.style.display = 'none';
        
        if (role === 'staff') {
            staffTab.classList.add('active');
            ownerTab.classList.remove('active');
            usernameInput.value = 'staff';
            passwordInput.value = 'staff123';
        } else {
            ownerTab.classList.add('active');
            staffTab.classList.remove('active');
            usernameInput.value = 'admin';
            passwordInput.value = 'admin123';
        }
    }
    
    // Trigger switchTab initially to set staff defaults
    switchTab('staff');

    async function handleLogin(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        
        errorMsg.style.display = 'none';
        submitBtn.disabled = true;
        btnText.textContent = 'Authenticating...';
        btnSpinner.style.display = 'inline-block';
        
        try {
            // OAuth2 requires application/x-www-form-urlencoded
            const params = new URLSearchParams();
            params.append('username', username);
            params.append('password', password);
            
            const response = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: params
            });
            
            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.detail || 'Incorrect username or password');
            }
            
            const tokenData = await response.json();
            localStorage.setItem('token', tokenData.access_token);
            
            // Get user profile
            const profileResponse = await fetch('/api/v1/auth/profile', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${tokenData.access_token}`
                }
            });
            
            if (!profileResponse.ok) {
                throw new Error('Failed to fetch user profile');
            }
            
            const profileData = await profileResponse.json();
            localStorage.setItem('username', profileData.username);
            localStorage.setItem('role', profileData.role);
            
            // Default view mode to owner for admins, staff for others
            localStorage.setItem('viewMode', profileData.role === 'ADMIN' ? 'owner' : 'staff');
            
            // Redirect to dashboard
            window.location.href = '/';
            
        } catch (err) {
            errorMsg.textContent = err.message;
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            btnText.textContent = 'Sign In';
            btnSpinner.style.display = 'none';
        }
    }
</script>
</body>
</html>
